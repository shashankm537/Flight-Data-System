version: '3.8'

services:

  fastapi:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: flight_fastapi
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    restart: unless-stopped

  streamlit:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: flight_streamlit
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - fastapi
    environment:
      - API_URL=http://fastapi:8000
    restart: unless-stopped