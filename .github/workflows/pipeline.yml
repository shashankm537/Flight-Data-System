name: Flight Data Pipeline

on:
  schedule:
    - cron: '30 0 * * *'  # 6AM IST (UTC+5:30) daily
    - cron: '30 12 * * *' # 6PM IST (UTC+5:30) daily
  workflow_dispatch:       # Allow manual trigger from GitHub

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create dbt profiles
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          flight_transform:
            target: prod
            outputs:
              prod:
                type: postgres
                host: ${{ secrets.DBT_HOST }}
                port: 5432
                user: ${{ secrets.DBT_USER }}
                password: ${{ secrets.DBT_PASSWORD }}
                dbname: neondb
                schema: warehouse
                threads: 4
                connect_timeout: 10
                sslmode: require
          EOF

      - name: Run OpenSky ingestion
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python ingestion/opensky_api.py

      - name: Run dbt transformations
        run: |
          cd transform/flight_transform
          dbt deps
          dbt run
          dbt test

      - name: Run feature engineering
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python transform/feature_engineering.py

      - name: Retrain ML model
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python ml/train.py

      - name: Upload trained model
        uses: actions/upload-artifact@v3
        with:
          name: flight-delay-model
          path: ml/models/flight_delay_model.pkl
          retention-days: 7